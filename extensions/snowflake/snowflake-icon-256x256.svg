<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1c2c"/>
      <stop offset="100%" style="stop-color:#060f18"/>
    </linearGradient>

    <!--
      JEDNO RAMIĘ — wskazuje w górę, obrót wokół (128, 107)
      Środek (cx=128, cy=107)
      Geometria:
        • trzon:      x=123 y=44 w=10 h=44  → y=44..88  (dolna krawędź dotyka ringu y=88)
        • gałąź L:    x=95  y=65 w=28 h=10  → styka się lewą kraw. trzonu
        • gałąź R:    x=133 y=65 w=28 h=10  → styka się prawą kraw. trzonu
        • widełki L:  x=109 y=28 w=14 h=20  → x=109..123, łączy się z lewą kraw. trzonu ✓
        • widełki R:  x=133 y=28 w=14 h=20  → x=133..147, łączy się z prawą kraw. trzonu ✓
        • karb Y:     x=123..133 przy y<44 — pusta szczelina między widełkami = kształt Y ✓
    -->
    <g id="arm">
      <!-- trzon -->
      <rect x="123" y="44" width="10" height="44" rx="3" fill="#29B5E8"/>
      <!-- gałąź lewa T -->
      <rect x="95"  y="65" width="28" height="10" rx="3" fill="#29B5E8"/>
      <!-- gałąź prawa T -->
      <rect x="133" y="65" width="28" height="10" rx="3" fill="#29B5E8"/>
      <!-- widełka lewa Y -->
      <rect x="109" y="28" width="14" height="20" rx="3" fill="#29B5E8"/>
      <!-- widełka prawa Y -->
      <rect x="133" y="28" width="14" height="20" rx="3" fill="#29B5E8"/>
    </g>
  </defs>

  <!-- Tło -->
  <rect width="256" height="256" rx="48" fill="url(#bg)"/>

  <!-- 6 ramion — obrót co 60° wokół środka płatka -->
  <use href="#arm" transform="rotate(  0, 128, 107)"/>
  <use href="#arm" transform="rotate( 60, 128, 107)"/>
  <use href="#arm" transform="rotate(120, 128, 107)"/>
  <use href="#arm" transform="rotate(180, 128, 107)"/>
  <use href="#arm" transform="rotate(240, 128, 107)"/>
  <use href="#arm" transform="rotate(300, 128, 107)"/>

  <!-- Ring centralny (zewn. krawędź ringu = dolna krawędź trzonków = y=88 → r=107-88=19, grub=10 → r=14) -->
  <circle cx="128" cy="107" r="14" fill="none"
          stroke="#29B5E8" stroke-width="10" stroke-linecap="round"/>

  <!-- Paski dolne -->
  <rect x="16"  y="222" width="48" height="16" rx="4" fill="#29B5E8"/>
  <rect x="70"  y="222" width="48" height="16" rx="4" fill="#29B5E8" opacity="0.7"/>
  <rect x="124" y="222" width="48" height="16" rx="4" fill="#29B5E8" opacity="0.5"/>
  <rect x="178" y="222" width="48" height="16" rx="4" fill="#29B5E8" opacity="0.3"/>
</svg>
