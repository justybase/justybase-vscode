  <!-- Row 0 y=22 light — ear top -->
  <rect x="130" y="22" width="12" height="12" rx="3" fill="#a8d8ea"/>
  <rect x="144" y="22" width="12" height="12" rx="3" fill="#a8d8ea"/>
